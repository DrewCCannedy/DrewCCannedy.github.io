name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout dooby-engine
        uses: actions/checkout@v4
        with:
          repository: DrewCCannedy/dooby-engine
          token: ${{ secrets.DOOBY_ENGINE_TOKEN }}
          path: _dooby-engine

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: _dooby-engine/package-lock.json

      - name: Build dooby-engine
        run: |
          cd _dooby-engine
          npm ci
          npm run build

      - name: Copy dooby-engine dist to site
        run: |
          mkdir -p dooby-engine
          cp -r _dooby-engine/dist/* dooby-engine/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
